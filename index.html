<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#010308">
  <title>Конкур</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Экран выбора игрока ── -->
  <div id="player-screen" class="screen active">
    <h1 class="game-title">КОНКУР</h1>
    <p class="player-subtitle">Выбери игрока</p>
    <button id="theme-btn" class="theme-toggle-btn">⚡ Неон</button>
    <div class="player-buttons">
      <button class="player-btn" data-player="vera">
        <span class="player-icon">🌸</span>
        <span class="player-name">VERA</span>
        <span class="player-best" id="best-vera">Рекорд: —</span>
      </button>
      <button class="player-btn" data-player="andrei">
        <span class="player-icon">⚡</span>
        <span class="player-name">ANDREI</span>
        <span class="player-best" id="best-andrei">Рекорд: —</span>
      </button>
    </div>
  </div>

  <!-- ── Экран настройки ── -->
  <div id="setup-screen" class="screen">
    <h1 class="game-title">КОНКУР</h1>
    <p id="setup-player-label" class="setup-player-label"></p>

    <div class="setup-container">

      <section class="setup-section">
        <h2>Лошадь</h2>

        <label>Порода</label>
        <div class="option-grid" id="breed-options">
          <button class="opt-btn active" data-breed="arabian">Арабская</button>
          <button class="opt-btn" data-breed="frisian">Фризская</button>
          <button class="opt-btn" data-breed="pinto">Пинто</button>
          <button class="opt-btn" data-breed="appaloosa">Аппалуза</button>
          <button class="opt-btn" data-breed="palomino">Паломино</button>
          <button class="opt-btn" data-breed="grey">Серая</button>
        </div>

        <label>Цвет шерсти</label>
        <div class="color-row" id="horse-coat-colors">
          <button class="color-btn active" data-color="#FFD700" style="background:#FFD700"></button>
          <button class="color-btn" data-color="#00FFFF" style="background:#00FFFF"></button>
          <button class="color-btn" data-color="#FF3366" style="background:#FF3366"></button>
          <button class="color-btn" data-color="#00FF88" style="background:#00FF88"></button>
          <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF"></button>
          <button class="color-btn" data-color="#C8834A" style="background:#C8834A"></button>
          <button class="color-btn" data-color="#9D00FF" style="background:#9D00FF"></button>
        </div>

        <label>Пятна / Окраска</label>
        <div class="option-grid" id="marking-options">
          <button class="opt-btn active" data-marking="none">Нет</button>
          <button class="opt-btn" data-marking="pinto">Пятна</button>
          <button class="opt-btn" data-marking="appaloosa">Крапинки</button>
          <button class="opt-btn" data-marking="star">Звезда</button>
          <button class="opt-btn" data-marking="stripe">Полоса</button>
          <button class="opt-btn" data-marking="socks">Носочки</button>
        </div>

        <label>Цвет пятен</label>
        <div class="color-row" id="marking-colors">
          <button class="color-btn active" data-color="#FFFFFF" style="background:#FFFFFF"></button>
          <button class="color-btn" data-color="#1A1A1A" style="background:#1A1A1A"></button>
          <button class="color-btn" data-color="#C8834A" style="background:#C8834A"></button>
          <button class="color-btn" data-color="#888888" style="background:#888888"></button>
          <button class="color-btn" data-color="#D4A017" style="background:#D4A017"></button>
        </div>

        <label>Снаряжение (цвет)</label>
        <div class="color-row" id="gear-colors">
          <button class="color-btn active" data-color="#00FFFF" style="background:#00FFFF"></button>
          <button class="color-btn" data-color="#FF3366" style="background:#FF3366"></button>
          <button class="color-btn" data-color="#39FF14" style="background:#39FF14"></button>
          <button class="color-btn" data-color="#9D00FF" style="background:#9D00FF"></button>
          <button class="color-btn" data-color="#FF6600" style="background:#FF6600"></button>
          <button class="color-btn" data-color="#FFD700" style="background:#FFD700"></button>
        </div>
      </section>

      <section class="setup-section">
        <h2>Наездник</h2>

        <label>Пол</label>
        <div class="option-grid" id="rider-gender">
          <button class="opt-btn active" data-gender="girl">Девочка</button>
          <button class="opt-btn" data-gender="boy">Мальчик</button>
        </div>

        <label>Цвет волос</label>
        <div class="color-row" id="hair-colors">
          <button class="color-btn active" data-color="#FF6347" style="background:#FF6347"></button>
          <button class="color-btn" data-color="#FFD700" style="background:#FFD700"></button>
          <button class="color-btn" data-color="#00FFFF" style="background:#00FFFF"></button>
          <button class="color-btn" data-color="#FF3366" style="background:#FF3366"></button>
          <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF"></button>
          <button class="color-btn" data-color="#9D00FF" style="background:#9D00FF"></button>
        </div>

        <label>Форма наездника (цвет)</label>
        <div class="color-row" id="outfit-colors">
          <button class="color-btn active" data-color="#00BFFF" style="background:#00BFFF"></button>
          <button class="color-btn" data-color="#39FF14" style="background:#39FF14"></button>
          <button class="color-btn" data-color="#FF3366" style="background:#FF3366"></button>
          <button class="color-btn" data-color="#FFD700" style="background:#FFD700"></button>
          <button class="color-btn" data-color="#9D00FF" style="background:#9D00FF"></button>
          <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF"></button>
        </div>
      </section>

    </div>

    <button id="start-btn" class="primary-btn">Начать игру!</button>
    <button id="change-player-btn" class="secondary-btn">Сменить игрока</button>
  </div>

  <!-- ── Игровой экран ── -->
  <div id="game-screen" class="screen">
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">Игрок</span>
        <span id="hud-player" class="hud-player">—</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Метры</span>
        <span id="hud-distance">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Рекорд</span>
        <span id="hud-best">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Ноги</span>
        <span id="hud-legs" class="hud-legs">🦵🦵🦵🦵🦵</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Жизни</span>
        <span id="hud-lives" class="hud-lives">♥♥♥</span>
      </div>
    </div>
    <canvas id="game-canvas"></canvas>

    <!-- Мобильные кнопки управления скоростью -->
    <div id="mobile-controls">
      <button id="btn-slow" class="ctrl-btn" aria-label="Замедлить">◀</button>
      <div id="tap-hint">↑ прыжок</div>
      <button id="btn-fast" class="ctrl-btn" aria-label="Ускорить">▶</button>
    </div>
  </div>

  <!-- ── Экран конца игры ── -->
  <div id="gameover-screen" class="screen">
    <div class="gameover-card">
      <h2 id="gameover-title">Игра окончена!</h2>
      <div class="stats-grid">
        <div class="stat-item">
          <span class="stat-label">Метры</span>
          <span class="stat-value" id="final-distance">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Рекорд</span>
          <span class="stat-value" id="final-best">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Прыжки</span>
          <span class="stat-value" id="final-jumps">0</span>
        </div>
      </div>
      <p id="new-record-msg" class="new-record-msg" style="display:none">🏆 Новый рекорд!</p>
      <button id="restart-btn" class="primary-btn">Ещё раз!</button>
      <button id="menu-btn" class="secondary-btn">Настройки</button>
      <button id="change-player-btn2" class="secondary-btn">Сменить игрока</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
